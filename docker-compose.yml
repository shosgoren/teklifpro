version: '3.8'

services:
  # Next.js Uygulaması
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teklifpro-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/teklifpro
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    networks:
      - teklifpro-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: teklifpro-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teklifpro
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=tr_TR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teklifpro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: teklifpro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - teklifpro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Prisma Studio
  studio:
    image: node:20-alpine
    container_name: teklifpro-studio
    working_dir: /app
    command: npx prisma studio
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/teklifpro
    ports:
      - "5555:5555"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teklifpro-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  teklifpro-network:
    driver: bridge
